name: Website sanity check

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-static-site:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify required website files
        run: |
          test -f index.html
          test -f styles.css
          test -f app.js
          test -f data/news.json
          test -f scripts/fetch-news.js

      - name: Validate saved news JSON
        run: node -e "const data = require('./data/news.json'); if (!Array.isArray(data.articles)) throw new Error('data/news.json must contain an articles array'); console.log('Validated ' + data.articles.length + ' saved articles.');"
