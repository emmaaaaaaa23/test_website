name: Update semiconductor news

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest industry news
        run: node scripts/fetch-news.js

      - name: Commit updated news data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update semiconductor news data"
          file_pattern: data/news.json
